*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;transition:background .25s,color .25s;overflow:hidden}
.dark{--bg:#080d18;--bg2:#0e1525;--card:#131e30;--card2:#1a2840;--border:#1e2e47;--text:#e2e8f5;--text2:#6b7a99;--text3:#4a5568}
.light{--bg:#f0f4fa;--bg2:#e4ecf7;--card:#ffffff;--card2:#f8fafd;--border:#dde6f5;--text:#0f172a;--text2:#475569;--text3:#94a3b8}
:root{--accent:#7c5af6;--pink:#d946ef;--indigo:#6366f1;--cyan:#06b6d4;--green:#10b981;--orange:#f59e0b;--red:#ef4444}
.app{display:flex;height:100vh;width:100vw;background:var(--bg);color:var(--text)}

/* SIDEBAR */
.sidebar{width:270px;min-width:270px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:0;overflow:hidden;transition:width .3s}
.sidebar.presentation{width:0;min-width:0;overflow:hidden;border:none}
.sidebar-logo{padding:20px 24px 18px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:10px}
.logo-img{width:110px;display:block;filter:brightness(0) invert(1);opacity:.88}
.light .logo-img{filter:none;opacity:1}
.logo-tagline{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:2px;text-transform:uppercase}
.logo-accent{height:2px;background:linear-gradient(90deg,var(--accent),transparent);border-radius:2px;margin-top:2px}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;padding:12px 20px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);transition:all .15s;border-left:3px solid transparent;margin:1px 0}
.nav-item:hover{background:var(--card);color:var(--text)}
.nav-item.active{background:var(--card);color:var(--accent);border-left-color:var(--accent)}
.nav-icon{font-size:16px;width:20px;text-align:center}
.sidebar-bottom{padding:14px 16px;border-top:1px solid var(--border)}
.version{font-size:10px;color:var(--text3);text-align:center;line-height:1.5}

/* SIDEBAR FILTERS */
.filter-section{border-bottom:1px solid var(--border)}
.filter-section-header{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;cursor:pointer;font-size:10px;font-weight:700;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;user-select:none;transition:color .15s}
.filter-section-header:hover{color:var(--text)}
.filter-chevron{font-size:10px;transition:transform .2s}
.filter-chevron.open{transform:rotate(180deg)}
.filter-chips{padding:0 12px 10px;display:flex;flex-wrap:wrap;gap:5px}
.chip{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card2);color:var(--text2);transition:all .15s;letter-spacing:.3px;text-transform:uppercase}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.filters-header{padding:10px 16px 4px;font-size:11px;font-weight:700;color:var(--accent);letter-spacing:2px;text-transform:uppercase}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:60px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;flex-shrink:0}
.topbar-left{display:flex;flex-direction:column}
.module-label{font-size:10px;font-weight:600;color:var(--accent);letter-spacing:2px;text-transform:uppercase}
.page-title{font-size:22px;font-weight:700;color:var(--text);line-height:1}
.topbar-right{display:flex;align-items:center;gap:12px}
.btn{padding:8px 18px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:.85}
.btn-ghost{background:var(--card2);border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{color:var(--text);border-color:var(--accent)}
.theme-toggle{width:36px;height:36px;border-radius:8px;background:var(--card2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}
.theme-toggle:hover{border-color:var(--accent)}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:20px}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;display:flex;flex-direction:column;gap:4px;transition:border-color .15s,transform .15s,box-shadow .15s}
.kpi-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.15)}
.kpi-label{font-size:10px;font-weight:600;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase}
.kpi-value{font-size:38px;font-weight:800;color:var(--text);line-height:1;letter-spacing:-1px;font-variant-numeric:tabular-nums}
.kpi-value.accent{color:var(--accent)}
.kpi-sub{font-size:12px;color:var(--text2)}
.kpi-change{font-size:11px;font-weight:600;margin-top:4px}
.kpi-change.up{color:var(--green)}
.kpi-change.down{color:var(--red)}

/* CHART GRID */
.chart-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.chart-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

.chart-wrap{position:relative;width:100%}
.legend{display:flex;gap:16px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* FILTER BAR */

.filter-select{background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 12px;cursor:pointer;outline:none}

.filter-label{font-size:12px;color:var(--text2);font-weight:500}

/* SALARY TABLE */

.salary-table th{text-align:left;padding:8px 12px;font-size:10px;font-weight:600;color:var(--text2);letter-spacing:1.2px;text-transform:uppercase;border-bottom:1px solid var(--border)}

.salary-table tr:hover td{background:var(--card2)}
.gap-neg{color:var(--red);font-weight:600}
.gap-pos{color:var(--green);font-weight:600}

.tweak-row{display:flex;flex-direction:column;gap:5px}

/* SCROLLBAR */

::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}

// ── COUNT-UP HOOK ───────────────────────────────────────────────────────────
function useCountUp(target, duration = 900) {
  const [display, setDisplay] = useState(target);
  const frame = useRef(null);
  useEffect(() => {
    // Extract numeric part and suffix
    const match = String(target).match(/^([^\d]*?)([\d.,]+)(.*)$/);
    if (!match) { setDisplay(target); return; }
    const prefix = match[1], suffix = match[3];
    const raw = parseFloat(match[2].replace(/,/g,''));
    const isFloat = match[2].includes('.');
    const decimals = isFloat ? (match[2].split('.')[1] || '').length : 0;
    let start = null;
    const step = ts => {
      if (!start) start = ts;
      const progress = Math.min((ts - start) / duration, 1);
      const ease = 1 - Math.pow(1 - progress, 3);
      const cur = raw * ease;
      const formatted = isFloat
        ? cur.toFixed(decimals)
        : Math.round(cur).toLocaleString('es-PY');
      setDisplay(prefix + formatted + suffix);
      if (progress < 1) frame.current = requestAnimationFrame(step);
    };
    frame.current = requestAnimationFrame(step);
    return () => cancelAnimationFrame(frame.current);
  }, [target]);
  return display;
}

    if (!canvasRef.current) return;
    if (instanceRef.current) { instanceRef.current.destroy(); instanceRef.current = null; }
    instanceRef.current = new Chart(canvasRef.current, { type, data, options });
    return () => { if (instanceRef.current) instanceRef.current.destroy(); };
  }, [chartKey]);
  return <canvas ref={canvasRef} />;
}

// ── KPI CARD ────────────────────────────────────────────────────────────────
function KPICard({ label, value, sub, change, accent }) {
  const animated = useCountUp(value);
  return (
    <div className="kpi-card">
      <div className="kpi-label">{label}</div>
      <div className={`kpi-value ${accent ? 'accent' : ''}`}>{animated}</div>
      {sub && <div className="kpi-sub">{sub}</div>}
      {change && <div className={`kpi-change ${change.startsWith('+') ? 'up' : 'down'}`}>{change}</div>}
    </div>
  );
}

// ── CHART CARD ──────────────────────────────────────────────────────────────
function ChartCard({ title, children, span2, legend }) {
  return (
    <div className={`chart-card ${span2 ? 'span2' : ''}`}>
      <div className="chart-title">{title}</div>
      {legend && <div className="legend">{legend.map(l => <div key={l.label} className="legend-item"><div className="legend-dot" style={{background:l.color}} />{l.label}</div>)}</div>}
      <div className="chart-wrap">{children}</div>
    </div>
  );
}

// ── THEME HELPERS ────────────────────────────────────────────────────────────
function getChartDefaults(dark) {
  const gridColor = dark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.06)';
  const tickColor = dark ? '#6b7a99' : '#94a3b8';
  return {
    gridColor, tickColor,
    plugins: { legend: { display: false }, tooltip: { titleFont:{family:'DM Sans',size:13}, bodyFont:{family:'DM Sans',size:12} }, datalabels: { display: false } },
    scales: {
      x: { grid:{color:gridColor}, ticks:{color:tickColor,font:{family:'DM Sans',size:11}} },
      y: { grid:{color:gridColor}, ticks:{color:tickColor,font:{family:'DM Sans',size:11}} },
    }
  };
}

// ── TABBAR COMPONENT ─────────────────────────────────────────────────────────
function TabBar({ tabs, active, onChange }) {
  return (
    <div style={{display:'flex',gap:0,borderBottom:'1px solid var(--border)'}}>
      {tabs.map(t => (
        <div key={t.id} onClick={()=>onChange(t.id)} style={{
          padding:'10px 18px', cursor:'pointer', fontSize:13, fontWeight:600,
          color: active===t.id ? 'var(--accent)' : 'var(--text2)',
          borderBottom: active===t.id ? '2px solid var(--accent)' : '2px solid transparent',
          transition:'all .15s', whiteSpace:'nowrap'
        }}>{t.label}</div>
      ))}
    </div>
  );
}
function TabContent({ tabKey, children }) {
  return <div key={tabKey} className="tab-content">{children}</div>;
}

function SidebarFilters() {
  const [open, setOpen] = useState({empresa:true, salida:false, anio:false, depto:false});
  const [selected, setSelected] = useState({empresa:[], salida:[], anio:['2025'], depto:[]});

  const toggle = (group, val) => {
    setSelected(prev => {
      const cur = prev[group];
      return {...prev, [group]: cur.includes(val) ? cur.filter(v=>v!==val) : [...cur, val]};
    });
  };

  return (
    <div style={{borderTop:'1px solid var(--border)'}}>
      {FILTER_GROUPS.map(g => (
        <div key={g.id} className="filter-section">
          <div className="filter-section-header" onClick={()=>setOpen(p=>({...p,[g.id]:!p[g.id]}))}>
            <span>{g.label}</span>
            <span className={`filter-chevron ${open[g.id]?'open':''}`}>▾</span>
          </div>
          {open[g.id] && (
            <div className="filter-chips">
              {g.options.map(opt => (
                <div key={opt} className={`chip ${selected[g.id].includes(opt)?'active':''}`} onClick={()=>toggle(g.id, opt)}>{opt}</div>
              ))}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "fontSize": 30,
  "accentColor": "#7c5af6",
  "chartBorderRadius": 6
}/*EDITMODE-END*/;

function App() {
  const saved = JSON.parse(localStorage.getItem('rrhh-state') || '{}');
  const [dark, setDark] = useState(saved.dark !== undefined ? saved.dark : true);
  const [activeId, setActiveId] = useState(saved.activeId || 'nomina');
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = useState(false);
  const [presenting, setPresenting] = useState(false);

  const togglePresentation = () => {
    const next = !presenting;
    setPresenting(next);
    if (next) document.documentElement.requestFullscreen?.();
    else document.exitFullscreen?.();
  };
  useEffect(() => {
    const onKey = e => { if (e.key === 'Escape') setPresenting(false); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);
  useEffect(() => {
    localStorage.setItem('rrhh-state', JSON.stringify({dark, activeId}));
  }, [dark, activeId]);

  useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    });
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
  }, []);

  const setTweak = (key, val) => {
    const next = {...tweaks, [key]: val};
    setTweaks(next);
    window.parent.postMessage({type:'__edit_mode_set_keys', edits: next}, '*');
    document.documentElement.style.setProperty('--accent', next.accentColor);
  };

  useEffect(() => {
    document.documentElement.style.setProperty('--accent', tweaks.accentColor);
  }, [tweaks.accentColor]);

  const active = MODULES.find(m => m.id === activeId);
  const themeClass = dark ? 'dark' : 'light';

  return (
    <div className={`app ${themeClass}${presenting ? ' presentation-mode' : ''}`}>
      {/* SIDEBAR */}
      <aside className={`sidebar ${themeClass}${presenting ? ' presentation' : ''}`}>
        <div className="sidebar-logo">
          <img src="assets/logo-texo.png" className="logo-img" alt="TEXO" />
          <div className="logo-tagline">Portal de RRHH</div>
          <div className="logo-accent" />
        </div>
        <nav className="sidebar-nav">
          <div className="nav-label">Módulos</div>
          {MODULES.map(m => (
            <div key={m.id} className={`nav-item ${activeId===m.id?'active':''}`} onClick={()=>setActiveId(m.id)}>
              <span className="nav-icon">{m.icon}</span>{m.label}
            </div>
          ))}

          {/* FILTROS */}
          <div className="filters-header">Filtros</div>
          <SidebarFilters />

          <div className="nav-item" style={{color:'var(--red)',marginTop:4}}>
            <span className="nav-icon">🚪</span>Cerrar sesión
          </div>
        </nav>
        <div className="sidebar-bottom">
          <div className="version">Danilo Sosa | Texo Sistemas</div>
        </div>
      </aside>

      {/* MAIN */}
      <div className="main">
        <div className="topbar">
          <div className="topbar-left">
            <div className="module-label">{active.moduleLabel}</div>
            <div className="page-title" style={{fontSize: Math.max(18, tweaks.fontSize * 0.65) + 'px'}}>{active.pageTitle}</div>
          </div>
          <div className="topbar-right">
            <button className={`btn-present ${presenting ? 'active' : ''}`} onClick={togglePresentation}>
              {presenting ? '✕ Salir' : '📺 Presentación'}
            </button>
            <button className="btn btn-primary" onClick={()=>alert('Actualizando datos...')}>Actualizar datos</button>
            <button className="theme-toggle" onClick={()=>setDark(!dark)}>{dark?'☀️':'🌙'}</button>
          </div>
        </div>

        <div className="content">
          {activeId==='nomina' && <ModuleNomina dark={dark} fontSize={tweaks.fontSize} />}
          {activeId==='reclutamiento' && <ModuleReclutamiento dark={dark} fontSize={tweaks.fontSize} />}
          {activeId==='rotacion' && <ModuleRotacion dark={dark} fontSize={tweaks.fontSize} />}
          {activeId==='costos' && <ModuleCostos dark={dark} fontSize={tweaks.fontSize} />}
          {activeId==='resumen' && <ModuleResumen dark={dark} />}
        </div>
      </div>

      {/* TWEAKS */}
      {showTweaks && (
        <div className={`tweaks-panel ${themeClass}`}>
          <div className="tweaks-title">⚙️ Tweaks</div>
          <div className="tweak-row">
            <label>Tamaño de KPIs</label>
            <input type="range" min={20} max={56} step={2} value={tweaks.fontSize} onChange={e=>setTweak('fontSize', +e.target.value)} />
            <div className="tweak-val">{tweaks.fontSize}px</div>
          </div>
          <div className="tweak-row">
            <label>Color Acento</label>
            <select value={tweaks.accentColor} onChange={e=>setTweak('accentColor', e.target.value)}>
              <option value="#7c5af6">Violeta</option>
              <option value="#0ea5e9">Azul</option>
              <option value="#10b981">Verde</option>
              <option value="#f59e0b">Ámbar</option>
              <option value="#ef4444">Rojo</option>
            </select>
          </div>
          <div className="tweak-row">
            <label>Modo</label>
            <select value={dark?'dark':'light'} onChange={e=>setDark(e.target.value==='dark')}>
              <option value="dark">Oscuro</option>
              <option value="light">Claro</option>
            </select>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
